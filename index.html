<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f766e">
<title>FL Business & Finance Study Coach</title>
<style>
:root{
  --bg:#0b1220; --panel:#121c2e; --panel2:#1a2740; --ink:#e8eef7; --muted:#9fb0c8;
  --teal:#14b8a6; --teal-d:#0f766e; --blue:#3b82f6; --green:#22c55e; --red:#ef4444;
  --amber:#f59e0b; --line:#243450; --chip:#22324f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:17px;line-height:1.5;}
.app{max-width:760px;margin:0 auto;padding:0 16px 96px;}
header.top{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,#0b1220 70%,rgba(11,18,32,0));
  padding:14px 0 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--blue));
  display:flex;align-items:center;justify-content:center;font-weight:800;color:#04141a;font-size:15px}
.brand small{display:block;font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.3px}
.who{font-size:12px;color:var(--muted);background:var(--chip);border:1px solid var(--line);
  padding:6px 10px;border-radius:20px;cursor:pointer;white-space:nowrap}
h1,h2,h3{line-height:1.25}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin:14px 0;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.grid{grid-template-columns:1fr}}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;
  transition:transform .08s ease,border-color .15s;display:flex;flex-direction:column;gap:6px}
.tile:active{transform:scale(.985)}
.tile:hover{border-color:var(--teal)}
.tile .ic{font-size:24px}
.tile h3{margin:2px 0 0;font-size:18px}
.tile p{margin:0;color:var(--muted);font-size:13.5px}
.btn{appearance:none;border:0;border-radius:12px;padding:14px 16px;font-size:16px;font-weight:650;
  cursor:pointer;width:100%;color:#04141a;background:var(--teal);transition:filter .15s,transform .06s}
.btn:active{transform:scale(.99)}
.btn:hover{filter:brightness(1.06)}
.btn.sec{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.btn.sm{padding:10px 12px;font-size:14px;width:auto}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row.tight{gap:8px}
.muted{color:var(--muted)}
.center{text-align:center}
.pill{display:inline-block;font-size:12px;padding:4px 10px;border-radius:20px;background:var(--chip);
  border:1px solid var(--line);color:var(--muted)}
.pill.d1{color:#7ee0d3;border-color:#1f4a44;background:#0e2a27}
.pill.d2{color:#ffd58a;border-color:#553d12;background:#2a2008}
.pill.d3{color:#ff9ea6;border-color:#5a1f25;background:#2a0e11}
.back{background:transparent;border:0;color:var(--muted);font-size:15px;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:6px}
.progressbar{height:8px;border-radius:6px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
.progressbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));width:0}
.choice{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
  color:var(--ink);border-radius:12px;padding:14px;margin:8px 0;cursor:pointer;font-size:16px;transition:.12s}
.choice:hover{border-color:var(--teal)}
.choice.correct{border-color:var(--green);background:#0f2c1c}
.choice.wrong{border-color:var(--red);background:#2c1416}
.choice.dim{opacity:.5}
.choice .k{display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;border-radius:7px;
  background:var(--chip);margin-right:10px;font-weight:700;font-size:13px}
input.txt{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:12px;
  padding:14px;font-size:17px;outline:none}
input.txt:focus{border-color:var(--teal)}
.feedback{border-radius:12px;padding:13px 14px;margin:12px 0;font-size:15px;border:1px solid var(--line)}
.feedback.hint{background:#241d07;border-color:#5a4712;color:#ffe1a3}
.feedback.good{background:#0f2c1c;border-color:#1f6b42;color:#b8f3cf}
.feedback.bad{background:#2c1416;border-color:#6b1f25;color:#ffc2c7}
.feedback.reveal{background:#101d33;border-color:#274168;color:#cfe0ff}
.feedback b{color:#fff}
.kbd{font-family:ui-monospace,Menlo,Consolas,monospace;background:#0a1322;border:1px solid var(--line);
  padding:1px 6px;border-radius:6px;font-size:13px}
.statline{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:15px}
.statline:last-child{border-bottom:0}
.big{font-size:34px;font-weight:800;letter-spacing:-.5px}
.flash{min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  cursor:pointer;padding:24px}
.flash .term{font-size:24px;font-weight:750}
.flash .def{font-size:17px;color:var(--ink)}
.tag{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.area-chip{font-size:12.5px;padding:8px 12px;border-radius:20px;background:var(--chip);border:1px solid var(--line);
  cursor:pointer;color:var(--ink)}
.area-chip.on{background:var(--teal-d);border-color:var(--teal);color:#eafffb;font-weight:650}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--panel2);
  border:1px solid var(--line);padding:12px 16px;border-radius:12px;font-size:14px;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.spacer{height:6px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.dot.g{background:var(--green)}.dot.r{background:var(--red)}.dot.y{background:var(--amber)}
ul.clean{margin:8px 0;padding-left:20px}ul.clean li{margin:7px 0}
.note{font-size:12.5px;color:var(--muted)}
hr.sep{border:0;border-top:1px solid var(--line);margin:16px 0}
a.link{color:var(--teal)}
.fab-help{position:fixed;right:16px;bottom:18px;background:var(--panel2);border:1px solid var(--line);color:var(--muted);
  width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;z-index:60}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <div class="logo">B&amp;F</div>
      <div>FL Business &amp; Finance Coach
        <small>HVAC Class B &middot; Builder's Guide to Accounting</small>
      </div>
    </div>
    <div class="who" id="whoChip" onclick="switchUser()">studying as &mdash;</div>
  </header>
  <div id="view"></div>
</div>
<button class="fab-help" title="How to use" onclick="showHelp()">?</button>

<script>
/* =========================================================================
   FL Business & Finance Study Coach  —  single-file study app
   Content modeled on standard Florida Construction Business & Finance exam
   topics and general construction-accounting principles aligned to
   "The Builder's Guide to Accounting." Original wording (not copied text).
   ========================================================================= */

/* ----------------------------- CONTENT BANK ----------------------------- */
const AREAS = [
  {id:"fundamentals", name:"Accounting Fundamentals", icon:"📘",
   summary:"The accounting equation, what bookkeeping does, and why builders track the numbers.",
   principles:[
     "The accounting equation is the foundation of all bookkeeping: Assets = Liabilities + Owner's Equity. It must always stay in balance.",
     "Every transaction affects at least two accounts and keeps the equation balanced — this is the basis of double-entry bookkeeping.",
     "Bookkeeping is the recording of transactions; accounting is the broader process of classifying, summarizing, interpreting, and reporting that information.",
     "Owner's equity represents the owner's claim on the business: what's left after liabilities are subtracted from assets (also called net worth).",
     "An 'account' is a record of all increases and decreases for a single item, such as Cash, Accounts Receivable, or Loans Payable.",
     "The going-concern assumption: records are kept assuming the business will continue operating, not be liquidated tomorrow.",
     "The business-entity concept: the company's finances are kept separate from the owner's personal finances."
   ]},
  {id:"debits", name:"Debits, Credits & Double-Entry", icon:"⚖️",
   summary:"How debits and credits work, normal balances, and the rules that never change.",
   principles:[
     "Debit means the LEFT side of an account; credit means the RIGHT side. Neither word means 'good' or 'bad,' 'increase' or 'decrease' by itself.",
     "Assets and expenses increase with a DEBIT and decrease with a credit. Their normal balance is a debit.",
     "Liabilities, owner's equity, and revenue increase with a CREDIT and decrease with a debit. Their normal balance is a credit.",
     "For every transaction, total debits must equal total credits. If they don't, the entry is wrong.",
     "A handy memory aid is DEAD-CLER (or DEALER): Debits raise Expenses, Assets, Dividends/Draws; Credits raise Liabilities, Equity, Revenue.",
     "Contra accounts carry a balance opposite their category — for example, Accumulated Depreciation is a contra-asset with a normal credit balance."
   ]},
  {id:"cycle", name:"Journals, Ledgers & the Cycle", icon:"📒",
   summary:"How a transaction flows from source document to financial statement.",
   principles:[
     "The accounting cycle: transaction → journal (the book of original entry) → ledger (posting) → trial balance → adjustments → financial statements → closing.",
     "The journal records transactions in date order (chronologically); the general ledger groups them by account.",
     "Posting is the process of transferring amounts from the journal to the proper ledger accounts.",
     "A trial balance lists every account's balance to check that total debits equal total credits. It catches some — but not all — errors.",
     "The chart of accounts is the master list of every account a company uses, usually numbered by type (assets, liabilities, equity, revenue, expenses).",
     "Closing entries zero out temporary accounts (revenue, expenses, draws) at period end and move the result into equity/retained earnings.",
     "Temporary accounts reset each period; permanent (real) accounts — assets, liabilities, equity — carry their balances forward."
   ]},
  {id:"cashaccrual", name:"Cash vs. Accrual & Methods", icon:"🔁",
   summary:"The two main accounting methods and when revenue and expenses get recorded.",
   principles:[
     "Cash basis records revenue when cash is received and expenses when cash is paid. Simple, but it can distort the true picture of a project-based business.",
     "Accrual basis records revenue when earned and expenses when incurred, regardless of when cash changes hands. It matches income with the costs that produced it.",
     "The matching principle: expenses should be recorded in the same period as the revenue they helped generate.",
     "The revenue-recognition principle: record revenue when it is earned (work performed / goods delivered), not necessarily when billed or collected.",
     "Construction contractors often use percentage-of-completion (recognize revenue as the job progresses) or completed-contract (recognize at the end) methods.",
     "Percentage-of-completion gives a smoother, more accurate picture of long jobs; completed-contract defers all profit until the job is done."
   ]},
  {id:"statements", name:"Financial Statements", icon:"📊",
   summary:"The balance sheet, income statement, and cash flow statement — what each tells you.",
   principles:[
     "The balance sheet is a snapshot at a point in time showing Assets = Liabilities + Equity.",
     "The income statement (profit & loss) covers a period of time and shows Revenue − Expenses = Net Income (profit or loss).",
     "The cash flow statement shows where cash came from and went, across operating, investing, and financing activities.",
     "Gross profit = Revenue − Cost of Goods Sold (direct job costs). Net profit = Gross profit − Overhead and other expenses.",
     "Current assets (cash, receivables, inventory) are expected to convert to cash within one year; current liabilities are due within one year.",
     "Retained earnings is accumulated profit kept in the business rather than paid out to owners.",
     "Financial statements should be prepared consistently period to period so results can be compared (the consistency principle)."
   ]},
  {id:"jobcost", name:"Job Costing & Cost Control", icon:"🏗️",
   summary:"Tracking direct and indirect costs, markup vs. margin, and estimating profit.",
   principles:[
     "Direct costs can be traced to a specific job: materials, job labor, subcontractors, equipment rental, permits.",
     "Indirect costs (overhead) keep the business running but aren't tied to one job: office rent, insurance, office salaries, utilities.",
     "Job costing assigns all direct costs to each job so you know whether that job actually made money.",
     "Markup is added to your cost to set price; margin is profit as a percentage of the selling price. They are NOT the same number.",
     "Markup % = (Price − Cost) ÷ Cost. Margin % = (Price − Cost) ÷ Price. A 50% markup is only a 33.3% margin.",
     "Overhead must be recovered through the price of jobs; under-recovering overhead is a common way contractors lose money while staying 'busy.'",
     "Cost overruns are caught early by comparing actual job costs to the original estimate (budget vs. actual)."
   ]},
  {id:"payroll", name:"Payroll & Payroll Taxes", icon:"💵",
   summary:"Gross vs. net pay, withholdings, employer taxes, and worker classification.",
   principles:[
     "Gross pay is total earnings before deductions; net pay (take-home) is what's left after withholdings.",
     "Employers withhold federal income tax, plus the employee's share of Social Security and Medicare (FICA), from each paycheck.",
     "FICA is split: 6.2% Social Security + 1.45% Medicare = 7.65% withheld from the employee, and the employer matches the same 7.65%.",
     "Employers also pay unemployment taxes: FUTA (federal) and SUTA (state). These are employer costs, not withheld from workers.",
     "Withheld taxes are a liability — they belong to the government and must be deposited on schedule, not spent by the business.",
     "An independent contractor (1099) controls how the work is done and pays their own taxes; an employee (W-2) has taxes withheld. Misclassifying workers carries serious penalties.",
     "Workers' compensation insurance covers job-site injuries and is generally required for construction employees."
   ]},
  {id:"depreciation", name:"Depreciation & Assets", icon:"📉",
   summary:"Spreading the cost of equipment over its useful life, and how assets are valued.",
   principles:[
     "Depreciation spreads the cost of a long-lived asset (truck, equipment) over its useful life instead of expensing it all at once.",
     "Only assets that wear out are depreciated. Land is NOT depreciated because it doesn't wear out.",
     "Straight-line depreciation = (Cost − Salvage value) ÷ Useful life, giving the same expense each year.",
     "Salvage (residual) value is the estimated worth of the asset at the end of its useful life.",
     "Book value = original cost − accumulated depreciation. It is not the same as market value.",
     "A capital expenditure buys or improves a long-term asset (depreciated over time); a revenue expense is consumed now (expensed immediately).",
     "Accelerated methods (like declining balance or MACRS for taxes) take more depreciation in the early years."
   ]},
  {id:"ratios", name:"Financial Ratios & Analysis", icon:"📐",
   summary:"Liquidity, profitability, and leverage ratios that reveal business health.",
   principles:[
     "The current ratio = Current Assets ÷ Current Liabilities. It measures short-term ability to pay bills; above 1.0 means current assets cover current debts.",
     "The quick (acid-test) ratio excludes inventory: (Current Assets − Inventory) ÷ Current Liabilities — a stricter liquidity test.",
     "Working capital = Current Assets − Current Liabilities. Positive working capital is a cushion for day-to-day operations.",
     "Net profit margin = Net Income ÷ Revenue. It shows how many cents of each sales dollar become profit.",
     "Debt-to-equity = Total Liabilities ÷ Owner's Equity. Higher means more reliance on borrowed money (more leverage and risk).",
     "Return on equity = Net Income ÷ Owner's Equity, showing the return the owner earns on their investment.",
     "Ratios are most useful compared over time and against industry benchmarks, not as a single number in isolation."
   ]},
  {id:"finance", name:"Budgeting, Cash Flow & Finance", icon:"🏦",
   summary:"Cash management, budgets, financing, and why profit isn't the same as cash.",
   principles:[
     "A budget is a plan that projects revenue and expenses; comparing actual to budget tells you where you're off course.",
     "Profit and cash are not the same — a profitable company can still run out of cash if receivables come in slower than bills go out.",
     "Cash flow is the timing of money in and out. Managing the gap between paying for a job and getting paid is critical for contractors.",
     "Retainage (retention) is a portion of payment withheld by the customer until the job is complete, which ties up the contractor's cash.",
     "A line of credit provides flexible short-term borrowing to smooth cash gaps; a term loan is borrowed once and repaid over a fixed schedule.",
     "Accounts receivable is money owed TO you by customers; accounts payable is money you owe to suppliers and subs.",
     "Aging reports group receivables/payables by how overdue they are (30/60/90 days) so you can chase the right accounts."
   ]}
];

const GLOSSARY = [
  {t:"Assets", d:"Everything a business owns that has value — cash, receivables, equipment, inventory, land.", area:"fundamentals"},
  {t:"Liabilities", d:"Debts and obligations the business owes to others, such as loans, accounts payable, and accrued taxes.", area:"fundamentals"},
  {t:"Owner's Equity", d:"The owner's claim on the business; assets minus liabilities. Also called net worth or capital.", area:"fundamentals"},
  {t:"Accounting Equation", d:"Assets = Liabilities + Owner's Equity. Must always remain in balance.", area:"fundamentals"},
  {t:"Bookkeeping", d:"The systematic recording of a business's financial transactions.", area:"fundamentals"},
  {t:"Account", d:"A record of all increases and decreases for one specific item, such as Cash or Accounts Payable.", area:"fundamentals"},
  {t:"Business-Entity Concept", d:"The idea that a business's finances are kept separate from the owner's personal finances.", area:"fundamentals"},
  {t:"Going Concern", d:"The assumption that a business will continue operating into the foreseeable future.", area:"fundamentals"},
  {t:"Debit", d:"An entry on the LEFT side of an account. Increases assets and expenses.", area:"debits"},
  {t:"Credit", d:"An entry on the RIGHT side of an account. Increases liabilities, equity, and revenue.", area:"debits"},
  {t:"Double-Entry Bookkeeping", d:"A system where every transaction has equal debits and credits, keeping the books in balance.", area:"debits"},
  {t:"Normal Balance", d:"The side (debit or credit) on which an account usually carries its balance.", area:"debits"},
  {t:"Contra Account", d:"An account with a balance opposite its category, e.g., Accumulated Depreciation (a contra-asset).", area:"debits"},
  {t:"Journal", d:"The book of original entry where transactions are first recorded, in date order.", area:"cycle"},
  {t:"Ledger", d:"A record that groups all transactions by account; the general ledger holds all accounts.", area:"cycle"},
  {t:"Posting", d:"Transferring amounts from the journal to the appropriate ledger accounts.", area:"cycle"},
  {t:"Trial Balance", d:"A list of all account balances used to verify that total debits equal total credits.", area:"cycle"},
  {t:"Chart of Accounts", d:"The organized, numbered master list of all accounts a business uses.", area:"cycle"},
  {t:"Closing Entries", d:"Entries that zero out temporary accounts at period end and transfer the result to equity.", area:"cycle"},
  {t:"Temporary Accounts", d:"Revenue, expense, and draw accounts that reset to zero each period.", area:"cycle"},
  {t:"Permanent Accounts", d:"Asset, liability, and equity accounts whose balances carry forward period to period.", area:"cycle"},
  {t:"Cash Basis", d:"Recording revenue when cash is received and expenses when cash is paid.", area:"cashaccrual"},
  {t:"Accrual Basis", d:"Recording revenue when earned and expenses when incurred, regardless of cash timing.", area:"cashaccrual"},
  {t:"Matching Principle", d:"Expenses are recorded in the same period as the revenue they helped earn.", area:"cashaccrual"},
  {t:"Revenue Recognition", d:"Recording revenue when it is earned, not necessarily when billed or collected.", area:"cashaccrual"},
  {t:"Percentage-of-Completion", d:"Recognizing contract revenue gradually as a job progresses.", area:"cashaccrual"},
  {t:"Completed-Contract", d:"Recognizing all contract revenue and profit only when the job is finished.", area:"cashaccrual"},
  {t:"Balance Sheet", d:"A financial statement showing assets, liabilities, and equity at a single point in time.", area:"statements"},
  {t:"Income Statement", d:"Also called profit & loss; shows revenue minus expenses over a period of time.", area:"statements"},
  {t:"Cash Flow Statement", d:"Reports cash movement across operating, investing, and financing activities.", area:"statements"},
  {t:"Gross Profit", d:"Revenue minus cost of goods sold (direct job costs).", area:"statements"},
  {t:"Net Income", d:"The bottom-line profit after all expenses, including overhead, are subtracted from revenue.", area:"statements"},
  {t:"Retained Earnings", d:"Accumulated profits kept in the business rather than distributed to owners.", area:"statements"},
  {t:"Current Asset", d:"An asset expected to convert to cash within one year (cash, receivables, inventory).", area:"statements"},
  {t:"Direct Costs", d:"Costs traceable to a specific job: materials, job labor, subcontractors, permits.", area:"jobcost"},
  {t:"Indirect Costs (Overhead)", d:"Costs of running the business not tied to one job: office rent, insurance, admin salaries.", area:"jobcost"},
  {t:"Job Costing", d:"Assigning all direct costs to a specific job to measure that job's profitability.", area:"jobcost"},
  {t:"Markup", d:"Amount added to cost to set price, expressed as a percent of COST.", area:"jobcost"},
  {t:"Margin", d:"Profit expressed as a percent of the SELLING PRICE.", area:"jobcost"},
  {t:"Cost of Goods Sold (COGS)", d:"The direct costs of producing the work sold during a period.", area:"jobcost"},
  {t:"Gross Pay", d:"An employee's total earnings before any deductions.", area:"payroll"},
  {t:"Net Pay", d:"Take-home pay after all withholdings are deducted from gross pay.", area:"payroll"},
  {t:"FICA", d:"Federal Insurance Contributions Act tax: Social Security (6.2%) + Medicare (1.45%), matched by employer.", area:"payroll"},
  {t:"FUTA", d:"Federal Unemployment Tax Act — an employer-paid unemployment tax.", area:"payroll"},
  {t:"SUTA", d:"State Unemployment Tax — an employer-paid state unemployment tax.", area:"payroll"},
  {t:"Withholding", d:"Money an employer holds back from a paycheck to remit to taxing authorities.", area:"payroll"},
  {t:"W-2 Employee", d:"A worker whose taxes are withheld and who is directed by the employer.", area:"payroll"},
  {t:"1099 Contractor", d:"An independent worker who controls how work is done and pays their own taxes.", area:"payroll"},
  {t:"Workers' Compensation", d:"Insurance covering medical costs and lost wages for job-site injuries.", area:"payroll"},
  {t:"Depreciation", d:"Allocating the cost of a long-lived asset over its useful life.", area:"depreciation"},
  {t:"Straight-Line Depreciation", d:"Equal depreciation each year: (Cost − Salvage) ÷ Useful life.", area:"depreciation"},
  {t:"Salvage Value", d:"The estimated value of an asset at the end of its useful life.", area:"depreciation"},
  {t:"Book Value", d:"Original cost minus accumulated depreciation.", area:"depreciation"},
  {t:"Capital Expenditure", d:"Spending to acquire or improve a long-term asset, depreciated over time.", area:"depreciation"},
  {t:"Useful Life", d:"The estimated period an asset will be productively used.", area:"depreciation"},
  {t:"Current Ratio", d:"Current Assets ÷ Current Liabilities; a measure of short-term liquidity.", area:"ratios"},
  {t:"Quick Ratio", d:"(Current Assets − Inventory) ÷ Current Liabilities; a stricter liquidity test.", area:"ratios"},
  {t:"Working Capital", d:"Current Assets minus Current Liabilities; the cushion for daily operations.", area:"ratios"},
  {t:"Net Profit Margin", d:"Net Income ÷ Revenue; profit as a percent of sales.", area:"ratios"},
  {t:"Debt-to-Equity", d:"Total Liabilities ÷ Owner's Equity; a measure of financial leverage.", area:"ratios"},
  {t:"Return on Equity", d:"Net Income ÷ Owner's Equity; the return earned on the owner's investment.", area:"ratios"},
  {t:"Budget", d:"A financial plan projecting future revenue and expenses.", area:"finance"},
  {t:"Cash Flow", d:"The timing and movement of money into and out of the business.", area:"finance"},
  {t:"Retainage", d:"A portion of contract payment withheld by the customer until completion.", area:"finance"},
  {t:"Accounts Receivable", d:"Money owed to the business by its customers.", area:"finance"},
  {t:"Accounts Payable", d:"Money the business owes to suppliers and subcontractors.", area:"finance"},
  {t:"Line of Credit", d:"A flexible borrowing arrangement used to cover short-term cash gaps.", area:"finance"},
  {t:"Aging Report", d:"A schedule grouping receivables or payables by how overdue they are.", area:"finance"}
];

/* Questions. type: mc | def | math. difficulty 1-3.
   mc: choices[], answer = index. def: accept[] keywords (lowercased). math: answer number, tol. */
const QUESTIONS = [
  /* ---- fundamentals ---- */
  {id:"f1",area:"fundamentals",type:"mc",d:1,q:"What is the fundamental accounting equation?",
   choices:["Assets = Liabilities − Equity","Assets = Liabilities + Owner's Equity","Revenue = Assets − Expenses","Equity = Assets + Liabilities"],answer:1,
   hints:["It always has to stay in balance.","Think of what the owner is left with after debts.","Assets equal what you owe plus what you own free and clear."],

/* ----------------------------- STATE / STORAGE ----------------------------- */
let USER = "Courtney";
const KEY = ()=>"flbf_"+USER.toLowerCase().replace(/[^a-z0-9]/g,"");
let DB = {qstats:{}, seen:0, correct:0, sessions:0, glossarySeen:{}};

function load(){
  try{ const raw=localStorage.getItem(KEY()); if(raw) DB=Object.assign(DB,JSON.parse(raw)); }catch(e){}
  if(!DB.qstats) DB.qstats={}; if(!DB.glossarySeen) DB.glossarySeen={};
}
function save(){ try{ localStorage.setItem(KEY(),JSON.stringify(DB)); }catch(e){} }
function initUser(){
  let u=localStorage.getItem("flbf_currentUser");
  if(!u){ u="Courtney"; localStorage.setItem("flbf_currentUser",u); }
  USER=u; load();
}
function switchUser(){
  const name=prompt("Whose progress? Type a name (e.g., Courtney, or your study partner's name):",USER);
  if(name && name.trim()){ save(); USER=name.trim(); localStorage.setItem("flbf_currentUser",USER);
    DB={qstats:{},seen:0,correct:0,sessions:0,glossarySeen:{}}; load(); render(); }
}

/* ----------------------------- HELPERS ----------------------------- */
const $=(s)=>document.querySelector(s);
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }
function areaById(id){ return AREAS.find(a=>a.id===id); }
function qstat(id){ return DB.qstats[id] || (DB.qstats[id]={seen:0,correct:0,wrong:0,streak:0}); }
function escapeHtml(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function toast(msg){ const t=el(`<div class="toast">${msg}</div>`); document.body.appendChild(t); setTimeout(()=>t.remove(),1800); }
function difLabel(d){ return d===1?"Easy":d===2?"Medium":"Hard"; }

function accuracy(){ return DB.seen? Math.round(100*DB.correct/DB.seen):0; }
function masteredCount(){ return Object.values(DB.qstats).filter(s=>s.correct>=2 && s.streak>=2).length; }
function wrongPool(){ return QUESTIONS.filter(q=>{const s=DB.qstats[q.id]; return s && s.wrong>0 && s.streak<2;}); }

/* Adaptive difficulty: unlock harder questions as accuracy/mastery grows */
function unlockedMaxDifficulty(){
  const m=masteredCount(), acc=accuracy();
  if(m>=18 || (DB.seen>=25 && acc>=80)) return 3;
  if(m>=6 || (DB.seen>=10 && acc>=65)) return 2;
  return 2; // medium available early so it's not too easy; hard gated
}

/* Build a weighted question list for a test */
function buildTest(areaIds, count){
  let pool=QUESTIONS.filter(q=>areaIds.includes(q.area));
  const maxD=unlockedMaxDifficulty();
  // keep within unlocked difficulty, but always allow if user specifically narrow
  let avail=pool.filter(q=>q.d<=maxD);
  if(avail.length<count) avail=pool;
  // weight: wrong questions and unseen get higher weight
  const weighted=[];
  avail.forEach(q=>{
    const s=DB.qstats[q.id]; let w=1;
    if(!s||s.seen===0) w=3;
    else if(s.wrong>0 && s.streak<2) w=5;       // recycle missed
    else if(s.streak>=2) w=0.5;                  // mastered, show less
    for(let i=0;i<Math.round(w*2);i++) weighted.push(q);
  });
  // sample without replacement
  const chosen=[]; const used=new Set();
  while(chosen.length<Math.min(count,avail.length) && weighted.length){
    const q=weighted[Math.floor(Math.random()*weighted.length)];
    if(!used.has(q.id)){ used.add(q.id); chosen.push(q); }
    if(used.size>=avail.length) break;
  }
  // shuffle order
  for(let i=chosen.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[chosen[i],chosen[j]]=[chosen[j],chosen[i]];}
  return chosen;
}

/* Answer checking */
function normalize(s){ return (s||"").toString().toLowerCase().replace(/[$,%]/g,"").replace(/\s+/g," ").trim(); }
function checkDef(input, accept){
  const n=normalize(input); if(n.length<2) return false;
  return accept.some(k=>n.includes(normalize(k)));
}
function checkMath(input, answer, tol){
  const v=parseFloat((input||"").toString().replace(/[$,%\s]/g,""));
  if(isNaN(v)) return false;
  return Math.abs(v-answer) <= (tol||0.001);
}

/* ---- Study principles ---- */
function studyMenu(){

    <div class="tile" onclick="go(()=>studyArea('${a.id}'))">

    <div class="grid">${items}</div>`;
}
function studyArea(id){

  $("#view").innerHTML=`<button class="back" onclick="back()">‹ Study areas</button>

}
function quizArea(id){ startTest([id], 8, areaById(id).name); }

/* ---- Glossary flashcards ---- */
function glossaryMenu(){
  const items=AREAS.map(a=>{
    const n=GLOSSARY.filter(g=>g.area===a.id).length;
    return `<div class="area-chip" onclick="go(()=>flashArea('${a.id}'))">${a.icon} ${a.name} <span class="muted">(${n})</span></div>`;
  }).join("");
  $("#view").innerHTML=`<button class="back" onclick="back()">‹ Home</button>
    <h2 style="margin:6px 0 2px">Glossary Flashcards</h2>
    <p class="muted" style="margin-top:0">Study all ${GLOSSARY.length} terms, or focus on one area. Tap a card to flip.</p>
    <button class="btn" onclick="go(()=>flashArea('all'))">Shuffle all ${GLOSSARY.length} terms</button>
    <div class="spacer"></div><div class="row tight" style="margin-top:8px">${items}</div>`;
}
let FLASH={list:[],i:0,flipped:false};
function flashArea(id){
  let list = id==="all"? GLOSSARY.slice() : GLOSSARY.filter(g=>g.area===id);
  for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]];}
  FLASH={list, i:0, flipped:false};
  renderFlash(id);
}
function renderFlash(id){
  const c=FLASH.list[FLASH.i];
  if(!c){ $("#view").innerHTML=`<button class="back" onclick="back()">‹ Back</button><div class="card center">No terms here.</div>`; return; }
  DB.glossarySeen[c.t]=1; save();
  const front=`<div class="tag">Term ${FLASH.i+1} / ${FLASH.list.length} &middot; tap to flip</div><div class="term">${escapeHtml(c.t)}</div>`;
  const backHtml=`<div class="tag">Definition &middot; tap to flip</div><div class="term" style="font-size:19px">${escapeHtml(c.t)}</div><div class="def" style="margin-top:8px">${escapeHtml(c.d)}</div>`;
  $("#view").innerHTML=`<button class="back" onclick="back()">‹ Glossary</button>
    <div class="card flash" onclick="flipCard('${id}')">${FLASH.flipped?backHtml:front}</div>
    <div class="row">
      <button class="btn sec sm" style="flex:1" onclick="prevCard('${id}')">‹ Prev</button>
      <button class="btn sm" style="flex:2" onclick="flipCard('${id}')">${FLASH.flipped?"Show term":"Show definition"}</button>
      <button class="btn sec sm" style="flex:1" onclick="nextCard('${id}')">Next ›</button>
    </div>`;
}
function flipCard(id){ FLASH.flipped=!FLASH.flipped; renderFlash(id); }
function nextCard(id){ FLASH.i=(FLASH.i+1)%FLASH.list.length; FLASH.flipped=false; renderFlash(id); }
function prevCard(id){ FLASH.i=(FLASH.i-1+FLASH.list.length)%FLASH.list.length; FLASH.flipped=false; renderFlash(id); }

/* ---- Test setup ---- */
let SEL=new Set();
function testSetup(){
  if(SEL.size===0) AREAS.forEach(a=>SEL.add(a.id));
  const chips=AREAS.map(a=>`<div class="area-chip ${SEL.has(a.id)?'on':''}" onclick="toggleArea('${a.id}')">${a.icon} ${a.name}</div>`).join("");
  $("#view").innerHTML=`<button class="back" onclick="back()">‹ Home</button>
    <h2 style="margin:6px 0 2px">Take a Test</h2>
    <p class="muted" style="margin-top:0">Choose one or more exam areas. You'll get a random mix of multiple-choice, math, and definition questions.</p>
    <div class="card">
      <div class="tag" style="margin-bottom:8px">Exam areas</div>
      <div class="row tight">${chips}</div>
      <div class="row tight" style="margin-top:12px">
        <button class="btn ghost sm" onclick="selAll(true)">Select all</button>
        <button class="btn ghost sm" onclick="selAll(false)">Clear</button>
      </div>
    </div>
    <div class="card">
      <div class="tag" style="margin-bottom:8px">How many questions?</div>
      <div class="row tight">
        ${[5,10,15,20].map(n=>`<button class="btn sec sm" onclick="launchTest(${n})">${n}</button>`).join("")}
      </div>
      <p class="note" style="margin-top:10px">Missed questions automatically come back more often. Hard questions unlock as you improve (currently up to <b>${difLabel(unlockedMaxDifficulty())}</b>).</p>
    </div>`;
}
function toggleArea(id){ if(SEL.has(id))SEL.delete(id); else SEL.add(id); testSetup(); }
function selAll(on){ SEL=new Set(); if(on) AREAS.forEach(a=>SEL.add(a.id)); testSetup(); }
function launchTest(n){
  if(SEL.size===0){ toast("Pick at least one area"); return; }
  startTest([...SEL], n, "Test");
}

/* ---- Review mistakes ---- */
function startReview(){
  const pool=wrongPool();
  if(pool.length===0){ toast("No missed questions yet — take a test first"); return; }
  const list=pool.slice();
  for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]];}
  go(()=>runTest(list,"Review Mistakes"));
}

/* ---- Test engine ---- */
function startTest(areaIds,count,label){
  const list=buildTest(areaIds,count);
  if(list.length===0){ toast("No questions available"); return; }
  go(()=>runTest(list,label));
}
let T=null;
function runTest(list,label){
  T={list,label,idx:0,attempts:0,score:0,answered:0,results:[]};
  DB.sessions++; save();
  renderQuestion();
}
function renderQuestion(){
  if(T.idx>=T.list.length){ return renderTestDone(); }
  const q=T.list[T.idx];
  T.attempts=T.attempts||0;
  const a=areaById(q.area);
  const dClass="d"+q.d;
  const prog=Math.round(100*T.idx/T.list.length);
  let body="";
  if(q.type==="mc"){
    body=q.choices.map((c,i)=>`<button class="choice" id="ch${i}" onclick="answerMC(${i})"><span class="k">${String.fromCharCode(65+i)}</span>${escapeHtml(c)}</button>`).join("");
  } else {
    const ph=q.type==="math"?"Type your number…":"Type your answer…";
    body=`<input class="txt" id="ansInput" placeholder="${ph}" autocomplete="off" ${q.type==='math'?'inputmode="decimal"':''}
            onkeydown="if(event.key==='Enter')answerText()">
          <div class="spacer"></div>
          <button class="btn" onclick="answerText()">Check answer</button>`;
  }
  $("#view").innerHTML=`
    <button class="back" onclick="quitTest()">‹ End session</button>
    <div class="progressbar" style="margin:6px 0 14px"><i style="width:${prog}%"></i></div>
    <div class="row" style="justify-content:space-between;align-items:center">
      <span class="pill">${a.icon} ${a.name}</span>
      <span class="pill ${dClass}">${difLabel(q.d)} &middot; ${q.type==='mc'?'Multiple choice':q.type==='math'?'Math':'Definition'}</span>
    </div>
    <div class="card" style="margin-top:10px">
      <div class="note">Question ${T.idx+1} of ${T.list.length} &middot; attempt ${T.attempts+1} of 3</div>
      <h3 style="margin:8px 0 14px;font-size:19px">${escapeHtml(q.q)}</h3>
      <div id="qbody">${body}</div>
      <div id="fb"></div>
    </div>`;
  const inp=$("#ansInput"); if(inp) inp.focus();
}

function recordResult(q,correct){
  const s=qstat(q.id); s.seen++; DB.seen++;
  if(correct){ s.correct++; s.streak=(s.streak||0)+1; DB.correct++; T.score++; }
  else { s.wrong++; s.streak=0; }
  save();
}

function answerMC(i){
  const q=T.list[T.idx];
  if(T._locked) return;
  const correct = i===q.answer;
  if(correct){
    T._locked=true;
    $("#ch"+i).classList.add("correct");
    document.querySelectorAll(".choice").forEach((b,idx)=>{if(idx!==i)b.classList.add("dim");b.onclick=null;});
    recordResult(q,true);
    showFeedback("good",`<b>Correct!</b> ${escapeHtml(q.exp)}`,true);
  } else {
    $("#ch"+i).classList.add("wrong"); $("#ch"+i).classList.add("dim"); $("#ch"+i).onclick=null;
    T.attempts++;
    handleWrong(q,false);
  }
}
function answerText(){
  const q=T.list[T.idx]; if(T._locked) return;
  const val=$("#ansInput").value;
  if(!val||!val.trim()){ toast("Type something first"); return; }
  let correct = q.type==="math" ? checkMath(val,q.answer,q.tol) : checkDef(val,q.accept);
  if(correct){
    T._locked=true; recordResult(q,true);
    showFeedback("good",`<b>Correct!</b> ${escapeHtml(q.exp)}`,true);
  } else {
    T.attempts++; handleWrong(q,true);
  }
}
function handleWrong(q,isText){
  if(T.attempts>=3){
    T._locked=true; recordResult(q,false);
    if(q.type==="mc"){ const b=document.querySelectorAll(".choice")[q.answer]; if(b){b.classList.remove("dim");b.classList.add("correct");} }
    let ans = q.type==="mc"? q.choices[q.answer] : (q.type==="math"? formatNum(q.answer) : q.exp);
    showFeedback("reveal",`<b>The answer:</b> ${q.type==='mc'?escapeHtml(ans):(q.type==='math'?escapeHtml(String(ans)):'')} <br><span style="opacity:.95">${escapeHtml(q.exp)}</span>`,true);
  } else {
    const hint=q.hints[Math.min(T.attempts-1,q.hints.length-1)];
    showFeedback("hint",`<b>Not quite.</b> Hint: ${escapeHtml(hint)} <span class="muted">(attempt ${T.attempts+1} of 3)</span>`,false);
    if(isText){ const inp=$("#ansInput"); if(inp){inp.value="";inp.focus();} }
  }
}
function formatNum(n){ return (Math.round(n*100)/100).toLocaleString(); }
function showFeedback(kind,html,done){
  const fb=$("#fb");
  fb.innerHTML=`<div class="feedback ${kind}">${html}</div>`;
  if(done){
    fb.innerHTML+=`<button class="btn" onclick="nextQuestion()">${T.idx+1>=T.list.length?'See results':'Next question'} ›</button>`;
  }
}
function nextQuestion(){ T.idx++; T.attempts=0; T._locked=false; renderQuestion(); }
function quitTest(){ if(T && T.answered>0){} back(); }
function renderTestDone(){
  const pct = T.list.length? Math.round(100*T.score/T.list.length):0;
  let msg = pct>=90?"Outstanding — you're exam-ready on this set.":pct>=75?"Solid work. A little polish and you're there.":pct>=50?"Good progress. Review the misses and run it again.":"Early days — keep grinding, it compounds fast.";
  const stillWrong=wrongPool().length;
  $("#view").innerHTML=`
    <div class="card center">
      <div class="tag">${escapeHtml(T.label)} complete</div>
      <div class="big" style="color:var(--teal);margin:6px 0">${T.score}/${T.list.length}</div>
      <div class="progressbar" style="margin:8px 0"><i style="width:${pct}%"></i></div>
      <p style="margin:10px 0 0">${msg}</p>
    </div>
    <div class="row">
      ${stillWrong? `<button class="btn" onclick="startReview()">Review ${stillWrong} missed ›</button>`:''}
      <button class="btn sec" onclick="home()">Back to home</button>
    </div>
    <div class="spacer"></div>
    <button class="btn ghost" onclick="go(()=>runTest(T.list,T.label))">Retake this set</button>`;
  NAV=[home];
}

/* ---- Stats ---- */
function statsView(){
  const rows=AREAS.map(a=>{
    const qs=QUESTIONS.filter(q=>q.area===a.id);
    let seen=0,correct=0,mastered=0;
    qs.forEach(q=>{const s=DB.qstats[q.id]; if(s){seen+=s.seen;correct+=s.correct; if(s.correct>=2&&s.streak>=2)mastered++;}});
    const acc=seen?Math.round(100*correct/seen):0;
    const mpct=Math.round(100*mastered/qs.length);
    const dot = mpct>=80?'g':mpct>=40?'y':'r';
    return `<div class="statline"><div><span class="dot ${dot}"></span>${a.icon} ${a.name}</div>
      <div class="muted">${mastered}/${qs.length} mastered &middot; ${acc}% acc</div></div>`;
  }).join("");
  const weak=AREAS.map(a=>{
    const qs=QUESTIONS.filter(q=>q.area===a.id); let mastered=0;
    qs.forEach(q=>{const s=DB.qstats[q.id]; if(s&&s.correct>=2&&s.streak>=2)mastered++;});
    return {a,gap:qs.length-mastered};
  }).sort((x,y)=>y.gap-x.gap)[0];
  $("#view").innerHTML=`<button class="back" onclick="back()">‹ Home</button>
    <h2 style="margin:6px 0 2px">My Stats</h2>
    <div class="card">
      <div class="row" style="justify-content:space-around;text-align:center">
        <div><div class="big">${accuracy()}%</div><div class="note">accuracy</div></div>
        <div><div class="big" style="color:var(--teal)">${masteredCount()}</div><div class="note">mastered</div></div>
        <div><div class="big">${DB.seen}</div><div class="note">answered</div></div>
      </div>
    </div>
    <div class="card">${rows}</div>
    ${weak&&weak.gap>0?`<div class="card"><div class="tag">Suggested focus</div>
      <p style="margin:6px 0 10px">Your biggest gap is <b>${weak.a.name}</b>. Knock it out next.</p>
      <button class="btn" onclick="startTest(['${weak.a.id}'],8,'${weak.a.name}')">Drill ${escapeHtml(weak.a.name)} ›</button></div>`:''}
    <button class="btn ghost" onclick="resetProgress()">Reset ${escapeHtml(USER)}'s progress</button>`;
}
function resetProgress(){
  if(confirm("Reset all progress for "+USER+"? This can't be undone.")){
    DB={qstats:{},seen:0,correct:0,sessions:0,glossarySeen:{}}; save(); toast("Progress reset"); home();
  }
}
